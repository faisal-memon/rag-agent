name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-*.txt

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Build application
        run: make build

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version tag
        id: bump
        uses: faisal-memon/pr-label-semver@v0
        with:
          version-bump: ${{ github.event_name == 'workflow_dispatch' && inputs.version_bump || '' }}
          github-token: ${{ github.token }}

      - name: Build and push Docker images
        uses: ./.github/actions/build-rag-images
        with:
          push: true
          tag: ${{ steps.bump.outputs.new-tag }}
          latest: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new-tag }}
          generate_release_notes: true
