<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal RAG</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="__BODY_CLASS__">
    <main>
      <section class="hero">
        <div class="eyebrow">nextcloud-rag</div>
        <h1>__PAGE_HEADING__</h1>
        <p class="subtitle">__PAGE_SUBTITLE__</p>
        <nav class="page-nav" aria-label="Application">
          <a class="agent-nav" href="/">Chat</a>
          <a class="debug-nav" href="/debug">Debug</a>
          <a href="/docs">API</a>
        </nav>
      </section>

      <section class="query-card">
        <label for="question">__INPUT_LABEL__</label>
        <textarea id="question" placeholder="__INPUT_PLACEHOLDER__"></textarea>
        <div class="actions">
          <div class="mode-picker" aria-label="Retrieval mode">
            <input type="radio" id="mode-semantic" name="retrieval-mode" value="semantic" checked />
            <label for="mode-semantic">Semantic</label>
            <input type="radio" id="mode-keyword" name="retrieval-mode" value="keyword" />
            <label for="mode-keyword">Keyword</label>
          </div>
          <button id="ask">Ask</button>
          <button class="secondary" id="agent">Send</button>
          <button class="secondary" id="debug">Debug retrieval</button>
          <button class="secondary" id="pipeline">Pipeline status</button>
          <span class="status" id="status">Ready</span>
        </div>
      </section>

      <section class="result" id="result">
        <div class="agent-chat-toolbar" id="agent-chat-toolbar">
          <span>Agent conversation · saved in this browser</span>
          <div class="agent-chat-controls">
            <button class="secondary" id="clear-chat">Clear chat</button>
          </div>
        </div>
        <div class="agent-chat" id="agent-chat" aria-live="polite"></div>
        <div id="pipeline-summary"></div>
        <div class="answer" id="answer"></div>
        <div class="pager" id="pager">
          <button class="secondary" id="previous">Previous</button>
          <button class="secondary" id="next">Next</button>
          <span class="status" id="page-status"></span>
        </div>
        <div class="citations" id="citations"></div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
